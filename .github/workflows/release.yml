name: release

on:
  push:
    tags: ['v*']

# Default-deny at the top; each job grants only what it needs.
permissions:
  contents: read

jobs:
  build:
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/overrule
            target/${{ matrix.target }}/release/overrule.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write # OIDC trusted publishing — no NPM_TOKEN, no OTP
      contents: write # gh release create
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc -p tsconfig.runtime.json # build the JS runtime half (join/guard/test)
      - uses: actions/download-artifact@v8
        with:
          path: binaries
      - run: node scripts/assemble-npm.mjs "${GITHUB_REF_NAME#v}" binaries dist-npm
      # Publish on the workflow's OIDC identity (npm trusted publishing). Platform
      # packages first, wrapper last so it never references a version that isn't up
      # yet. No token, no OTP; npm attaches provenance automatically.
      - run: |
          for p in dist-npm/overrule-*; do (cd "$p" && npm publish --provenance --access public); done
          (cd dist-npm/overrule && npm publish --provenance --access public)
      - run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
