name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          # windows-11-arm is public-repo only; fine here, and a native build
          # keeps mimalloc's C away from the MSVC cross toolchain.
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      # musl-gcc, which cc needs to compile mimalloc for the musl target.
      - run: sudo apt-get install -y musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
      - run: cargo build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/overrule
            target/${{ matrix.target }}/release/overrule.exe

  test:
    uses: ./.github/workflows/ci.yml

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The binary reports the crate version, npm reports the tag; 0.4.8
      # shipped self-reporting 0.4.7 because nothing tied them together.
      - run: grep -q "^version = \"${GITHUB_REF_NAME#v}\"" Cargo.toml

  release:
    needs: [build, test, version-check]
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC trusted publishing — no NPM_TOKEN, no OTP
      contents: write # gh release create
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - uses: actions/download-artifact@v8
        with:
          path: binaries
      - run: node scripts/assemble-npm.mjs "${GITHUB_REF_NAME#v}" binaries dist-npm
      # Publish on the workflow's OIDC identity (npm trusted publishing). Platform
      # packages first, wrapper last so it never references a version that isn't up
      # yet. No token, no OTP; npm attaches provenance automatically.
      # Skip versions that already exist so a failed run can be re-driven:
      # a partial publish once stranded 0.4.3, and 0.4.9 died the same way
      # when one platform package lacked its trusted publisher.
      - run: |
          publish() {
            name=$(node -p "require('./$1/package.json').name")
            version=$(node -p "require('./$1/package.json').version")
            if curl -sf -o /dev/null "https://registry.npmjs.org/$name/$version"; then
              echo "$name@$version already published, skipping"
            else
              (cd "$1" && npm publish --provenance --access public)
            fi
          }
          for p in dist-npm/overrule-*; do publish "$p"; done
          publish dist-npm/overrule
      - run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
