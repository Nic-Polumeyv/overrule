name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run build
      - name: cli contract under node
        run: |
          node dist/cli.js check src
          set +e
          out=$(node dist/cli.js check test/fixtures)
          code=$?
          set -e
          echo "$out"
          test "$code" -eq 1
          echo "$out" | grep -q "conflicting class strings"
